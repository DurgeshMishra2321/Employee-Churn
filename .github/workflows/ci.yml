name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint
        run: ruff check src tests

      - name: Train model (produces models/model.joblib for the quality-gate tests)
        run: python src/train.py

      - name: Run tests (data checks, manual-vs-sklearn metrics, model quality gate, API contract)
        run: pytest -v

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: model
          path: models/

      - name: Build Docker image
        run: docker build -t churn-predictor:${{ github.sha }} .
