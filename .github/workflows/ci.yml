name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint
        run: ruff check src tests

      - name: Train model (produces models/model.joblib for the quality-gate tests)
        run: python src/train.py

      - name: Run tests (data checks, manual-vs-sklearn metrics, model quality gate, API contract)
        run: pytest -v

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The image trains the model itself during the build (see Dockerfile) —
      # the quality gate above already vetted that this exact, deterministic
      # training run meets the recall/accuracy bar before we get here.
      - name: Build Docker image
        run: docker build -t churn-predictor:${{ github.sha }} .
